<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Consulta Pública · Comissão de Juízes Auxiliares – 2º Grau</title>
<link rel="stylesheet" href="./style.css?v=20260720_pages">
<style>
.erro-carregamento{max-width:1100px;margin:35px auto;padding:24px;border:1px solid #d9a3a3;border-radius:14px;background:#fff4f4;color:#7b1d1d}.carregando{max-width:1100px;margin:35px auto;padding:28px;text-align:center}.sem-link{cursor:default;text-decoration:none}.public-footer-note{margin-bottom:32px}

.modal-fundo{position:fixed;inset:0;background:rgba(4,24,43,.72);z-index:9999;display:none;align-items:center;justify-content:center;padding:22px}.modal-fundo.aberto{display:flex}.modal-caixa{width:min(1420px,98vw);max-height:92vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 25px 70px rgba(0,0,0,.35)}.modal-topo{position:sticky;top:0;z-index:3;display:flex;justify-content:space-between;gap:16px;align-items:center;padding:16px 18px;background:#103f70;color:#fff}.modal-topo h2{margin:0;font-size:20px}.modal-fechar{background:#fff;color:#103f70;padding:8px 12px}.modal-corpo{padding:18px}.modal-acoes{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px}.modal-acoes button{background:#103f70;color:#fff}.detalhe-link{cursor:pointer}.sem-link{cursor:default}.relatorios-inline{display:flex;gap:8px;flex-wrap:wrap}.relatorios-inline button{padding:8px 11px;font-size:12px}.public-cards{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.public-cards{grid-template-columns:1fr 1fr}}@media(max-width:560px){.public-cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header">
 <div class="header-inner">
  <div class="brand-row">
   <div class="logo-card">
    <div class="logo-mark" aria-label="Justiça Eleitoral">
      <svg width="79" height="79" viewBox="0 0 120 120" role="img" aria-label="Marca Justiça Eleitoral">
        <rect x="50" y="22" width="49" height="75" rx="1" fill="#f3c51c"/><path d="M48 28H100V98H40Z" fill="#f3c51c" opacity=".98"/><path d="M40 98 L100 98 L100 60 Z" fill="#205e44"/><path d="M39 98 L100 59" stroke="#fff" stroke-width="4"/><circle cx="52" cy="49" r="38" fill="#2d5eb8" stroke="#fff" stroke-width="4"/><g fill="#fff"><circle cx="33" cy="36" r="2.1"/><circle cx="41" cy="26" r="2"/><circle cx="56" cy="24" r="1.7"/><circle cx="69" cy="31" r="2"/><circle cx="74" cy="44" r="1.8"/><circle cx="63" cy="58" r="1.9"/><circle cx="47" cy="61" r="1.7"/><circle cx="31" cy="53" r="1.9"/><circle cx="57" cy="39" r="1.5"/><circle cx="43" cy="45" r="1.4"/></g>
      </svg>
    </div>
    <div class="logo-copy"><div class="small">Tribunal Regional Eleitoral</div><div class="big">TRE <span>MARANHÃO</span></div></div>
   </div>
   <div class="title"><div class="eyebrow">Consulta Pública</div><h1>Comissão de Juízes Auxiliares <span>– 2º Grau</span></h1><p>Estoque, julgamentos e distribuição de minuta</p></div>
   <div class="election-card" aria-label="Eleições 2026"><div class="election-word"><span>EL</span><span class="bars"><i></i><i></i><i></i></span><span>IÇÕES</span></div><span class="year">2026</span><div class="motto"><span class="voto">#VOTO</span><span class="na">NA</span>DEMOCRACIA</div></div>
  </div>
  <div class="navline"><nav class="nav"><a href="#comparativo">Comparativo</a><a href="#entrada-comissao">Entrada</a><a href="#tarefas-criticas">Tarefas críticas</a><a href="#todas-tarefas">Todas as tarefas</a><a href="#julgados">Julgados</a><a href="#minuta">Minutas</a></nav></div>
 </div>
</header>
<main id="conteudo"><section class="carregando"><h2>Carregando painel público...</h2></section></main>

<script>
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const arr=v=>Array.isArray(v)?v:[];
const numero=v=>Number(v||0).toLocaleString('pt-BR');
const nomeJuiz=g=>g==='Gab. JA 1'?'Dr. Nilo Ribeiro':g==='Gab. JA 2'?'Dra. Manuella Ribeiro':'Dr. Rubem Filho';
let DADOS={}; let RELATORIO_ATUAL=[]; let TITULO_ATUAL='Relatório público';
function tabela(cab,linhas){return `<div class="wrap"><table><thead><tr>${cab.map(x=>`<th>${esc(x)}</th>`).join('')}</tr></thead><tbody>${linhas.join('')||`<tr><td colspan="${cab.length}">Nenhum registro disponível.</td></tr>`}</tbody></table></div>`}
function processosTabela(itens){return tabela(['Processo','Gabinete','Classe','Tarefa atual','Autuação','Desde','Dias','Responsável','Julgamento'],arr(itens).map(x=>`<tr><td class="processo">${esc(x.processo)}</td><td><span class="chip">${esc(x.sigla||x.gabinete||'')}</span></td><td>${esc(x.classe)}</td><td>${esc(x.tarefa_atual)}</td><td>${esc(x.autuacao)}</td><td>${esc(x.desde)}</td><td><span class="badge-dias">${numero(x.dias_tramitando)}</span></td><td>${esc(x.responsavel_processo)}</td><td>${esc(x.julgamento||x.teor||'')}</td></tr>`))}
function abrirDetalhe(titulo,itens){TITULO_ATUAL=titulo;RELATORIO_ATUAL=arr(itens);document.getElementById('modal-titulo').textContent=`${titulo} · ${RELATORIO_ATUAL.length} processo(s)`;document.getElementById('modal-conteudo').innerHTML=processosTabela(RELATORIO_ATUAL);document.getElementById('modal').classList.add('aberto');document.body.style.overflow='hidden'}
function fecharDetalhe(){document.getElementById('modal').classList.remove('aberto');document.body.style.overflow=''}
function csvValor(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
function baixarExcel(){const cab=['Processo','Gabinete','Classe','Tarefa atual','Autuação','Desde','Dias','Responsável','Julgamento'];const linhas=RELATORIO_ATUAL.map(x=>[x.processo,x.sigla||x.gabinete,x.classe,x.tarefa_atual,x.autuacao,x.desde,x.dias_tramitando,x.responsavel_processo,x.julgamento||x.teor]);const csv='\ufeff'+[cab,...linhas].map(l=>l.map(csvValor).join(';')).join('\r\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=TITULO_ATUAL.replace(/[^a-z0-9]+/gi,'_').toLowerCase()+'.csv';a.click();URL.revokeObjectURL(a.href)}
function imprimirPDF(){const w=window.open('','_blank');w.document.write(`<html><head><meta charset="utf-8"><title>${esc(TITULO_ATUAL)}</title><style>body{font-family:Arial;padding:20px;color:#173f67}h1{font-size:20px}table{width:100%;border-collapse:collapse;font-size:10px}th,td{border:1px solid #ccd8e3;padding:5px;text-align:left}th{background:#103f70;color:#fff}@page{size:landscape;margin:10mm}</style></head><body><h1>${esc(TITULO_ATUAL)}</h1><p>${RELATORIO_ATUAL.length} processo(s) · Consulta pública</p>${processosTabela(RELATORIO_ATUAL)}<script>setTimeout(()=>print(),250)<\/script></body></html>`);w.document.close()}
function detalhe(tipo,chave,titulo){let itens=[];if(tipo==='entrada')itens=DADOS.entrada_comissao_processos;if(tipo==='critica')itens=(DADOS.tarefas_criticas_processos||{})[chave];if(tipo==='tarefa')itens=(DADOS.todas_tarefas_processos||{})[chave];if(tipo==='gabinete')itens=(DADOS.acervo_por_gabinete||{})[chave];if(tipo==='minuta')itens=DADOS.minutar_processos;if(tipo==='julgados')itens=DADOS.julgados_recentes;abrirDetalhe(titulo,itens)}
function normalizarGabinete(v){
 return String(v||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'');
}
function processosDoGabinete(itens,gabinete){
 const alvo=normalizarGabinete(gabinete);
 return arr(itens).filter(x=>{
   const identificadores=[x.sigla,x.gabinete,x.gabinete_atual,x.nome_gabinete,x.unidade,x.orgao];
   return identificadores.some(v=>normalizarGabinete(v)===alvo);
 });
}
function detalheTarefaGabinete(chave,gabinete,titulo){
 const itens=processosDoGabinete((DADOS.todas_tarefas_processos||{})[chave],gabinete);
 abrirDetalhe(`${titulo} · ${gabinete}`,itens);
}
function detalheCriticaGabinete(chave,gabinete,titulo){
 const itens=processosDoGabinete((DADOS.tarefas_criticas_processos||{})[chave],gabinete);
 abrirDetalhe(`${titulo} · ${gabinete}`,itens);
}
function render(d){DADOS=d;const e=d.entrada_comissao||{},tc=d.tarefas_criticas||{},tt=d.todas_tarefas||{};const cols=arr(tc.colunas),linhas=arr(tc.linhas),tarefas=arr(tt.linhas),gabCols=arr(tt.colunas),comp=arr(d.comparativo);
let h=`<section class="visao-geral"><div><span class="rotulo">CONSULTA PÚBLICA</span><h2>Acompanhamento da Comissão</h2><p>Dados restritos a processos sem segredo de justiça.</p></div><div class="fonte"><i></i><div><span>Última publicação</span><strong>${esc(d.publicado_em||'Não informada')}</strong></div></div></section>`;
h+=`<section class="cards public-cards"><article class="card azul"><div class="ico">▤</div><div><span>Estoque atual</span><b>${numero(d.total)}</b><em>processos públicos</em></div></article><article class="card verde detalhe-link" onclick="detalhe('julgados','','Processos julgados recentes')"><div class="ico">✓</div><div><span>Processos julgados</span><b>${numero(d.julgados_total)}</b><em>Clique para detalhar</em></div></article><article class="card amarelo"><div class="ico">▣</div><div><span>Arquivados</span><b>${numero(d.arquivados_total)}</b><em>identificados na base</em></div></article><article class="card ciano detalhe-link" onclick="detalhe('minuta','','Processos em Minutar ato')"><div class="ico">▧</div><div><span>Minutar ato</span><b>${numero(arr(d.minutar_processos).length)}</b><em>Clique para detalhar</em></div></article></section>`;
if(d.entrada_comissao)h+=`<section id="entrada-comissao" class="painel entrada-comissao-painel"><div class="entrada-comissao-card ${Number(e.total||0)===0?'zero':''}"><div class="entrada-comissao-icone">⚖</div><div class="entrada-comissao-info"><span class="rotulo">PORTA DE ENTRADA DA COMISSÃO</span><h2>Processos com liminar aguardando certificação</h2><p>${esc(e.descricao||'')}</p></div><button class="entrada-comissao-numero detalhe-link" onclick="detalhe('entrada','','Entrada da Comissão')"><small>Total público</small><strong>${numero(e.total)}</strong></button><div class="entrada-comissao-acoes"><button class="btn-relatorio secundario" onclick="detalhe('entrada','','Entrada da Comissão')">Ver processos</button></div></div></section>`;
if(comp.length)h+=`<section id="comparativo" class="painel"><div class="cabecalho-painel"><div><span class="rotulo">COMPARATIVO</span><h2>Indicadores por gabinete</h2></div></div><div class="comparativo">${comp.map((x,i)=>`<article class="gab cja${i+1}"><div class="gab-topo"><strong>${esc(x.gabinete)}</strong><span>${esc(x.juiz||nomeJuiz(x.gabinete))}</span></div><div class="gab-corpo"><div class="estoque-linha"><span>Estoque público</span><strong>${numero(x.quantidade)}</strong></div><div class="metricas"><span>Julgados<b>${numero(x.julgados)}</b></span><span>Arquivados<b>${numero(x.arquivados)}</b></span><span>Urgentes<b>${numero(x.urgentes)}</b></span><span>Maior tempo<b>${numero(x.maior_tempo)} dias</b></span></div><button class="link-detalhar" onclick="detalhe('gabinete','${esc(x.gabinete)}','Acervo ${esc(x.gabinete)}')">Ver processos e relatórios</button></div></article>`).join('')}</div></section>`;
if(linhas.length)h+=`<section id="tarefas-criticas" class="painel tarefas-criticas-painel"><div class="tarefas-criticas-cabecalho"><div><span class="rotulo">CONTROLE OPERACIONAL</span><h2>Tarefas críticas por gabinete</h2><p>Clique em uma tarefa para consultar os processos públicos.</p></div></div><div class="tarefas-gabinetes-grid">${linhas.map((l,i)=>`<article class="tarefa-gab-card tarefa-gab-${i+1}"><div class="tarefa-gab-topo"><div><h3>${esc(l.gabinete)}</h3><p>${esc(nomeJuiz(l.gabinete))}</p></div><button class="tarefa-acervo" onclick="detalhe('gabinete','${esc(l.gabinete)}','Acervo ${esc(l.gabinete)}')"><small>Acervo</small><strong>${numero(l.total_acervo)}</strong></button></div><div class="tarefas-metricas">${cols.map(c=>`<button class="crit-task ${(c.codigo||'').toLowerCase()}" onclick="detalheCriticaGabinete('${esc(c.codigo)}','${esc(l.gabinete)}','${esc(c.rotulo)}')"><span>${esc(c.rotulo)}</span><strong>${numero((l.contagens||{})[c.codigo])}</strong><em>${esc(c.descricao)}</em></button>`).join('')}</div></article>`).join('')}</div></section>`;
if(tarefas.length){
const cards=gabCols.map((g,i)=>{
 const itens=tarefas.map(t=>{
   const v=Number((t.contagens||{})[g.nome]||0);
   return v?`<button class="todas-task-row" onclick="detalheTarefaGabinete('${esc(t.codigo)}','${esc(g.gabinete||g.nome)}','${esc(t.tarefa_atual||t.tarefa)}')"><span>${esc(t.tarefa_atual||t.tarefa)}</span><strong>${numero(v)}</strong></button>`:'';
 }).join('');
 const ac=(comp.find(x=>x.gabinete===(g.gabinete||g.nome))||{}).quantidade||0;
 return `<article class="todas-gab-card todas-gab-${i+1}">
 <div class="todas-gab-topo">
 <div><h3>${esc(g.gabinete||g.nome)}</h3><p>${esc(nomeJuiz(g.gabinete||g.nome))}</p></div>
 <button class="todas-gab-acervo" onclick="detalhe('gabinete','${esc(g.gabinete||g.nome)}','Acervo ${esc(g.gabinete||g.nome)}')"><small>Acervo</small><strong>${numero(ac)}</strong></button>
 </div>
 <div class="todas-gab-lista">${itens}</div>
 </article>`;
 }).join('');
h+=`<section id="todas-tarefas" class="painel todas-tarefas-painel">
<div class="cabecalho-painel todas-tarefas-cabecalho">
<div><span class="rotulo">ESTOQUE OPERACIONAL</span><h2>Todas as tarefas por gabinete</h2><p>Visualização organizada por gabinete, no mesmo padrão das tarefas críticas.</p></div>
<span class="pill">${tarefas.length} tarefa(s)</span>
</div>
<div class="todas-tarefas-gabinetes-grid">${cards}</div>
<div class="todas-relatorios-bloco">
<div class="todas-relatorios-topo"><h3>Visão consolidada da Comissão</h3></div>
<div class="todas-tarefas-wrap compacto"><table class="todas-tarefas-tabela compacta"><thead><tr><th>Tarefa</th>${gabCols.map(c=>`<th>${esc(c.gabinete||c.nome)}</th>`).join('')}<th>Total</th></tr></thead><tbody>${tarefas.map(t=>{const cs=t.contagens||{};let total=0;const cel=gabCols.map(c=>{const v=Number(cs[c.nome]||0);total+=v;return `<td><button class="tarefa-numero" onclick="detalhe('tarefa','${esc(t.codigo)}','${esc(t.tarefa_atual||t.tarefa)}')">${numero(v)}</button></td>`}).join('');return `<tr><td><button class="link-detalhar" onclick="detalhe('tarefa','${esc(t.codigo)}','${esc(t.tarefa_atual||t.tarefa)}')">${esc(t.tarefa_atual||t.tarefa)}</button></td>${cel}<td><button class="tarefa-total" onclick="detalhe('tarefa','${esc(t.codigo)}','${esc(t.tarefa_atual||t.tarefa)}')">${numero(total)}</button></td></tr>`}).join('')}</tbody></table></div></div>
</section>`;
}
const jr=arr(d.julgados_recentes);if(jr.length)h+=`<section id="julgados" class="painel"><div class="cabecalho-painel"><div><span class="rotulo">JULGAMENTOS</span><h2>Julgados recentes</h2><p>Relação pública dos julgamentos mais recentes.</p></div><button class="btn-relatorio" onclick="detalhe('julgados','','Processos julgados recentes')">Detalhar e gerar relatório</button></div>${processosTabela(jr.slice(0,10))}</section>`;
h+=`<section id="minuta" class="painel minuta"><div class="cabecalho-painel"><div><span class="rotulo">OPERAÇÃO</span><h2>Distribuição de minuta</h2><p>${arr(d.minutar_processos).length} processo(s) público(s) nessa fila.</p></div><button class="btn-relatorio" onclick="detalhe('minuta','','Processos em Minutar ato')">Detalhar e gerar relatório</button></div></section><section class="painel public-footer-note"><span class="rotulo">ORIGEM</span><p>Arquivo: <b>${esc(d.arquivo_origem||'não informado')}</b>. Processos em segredo de justiça não são publicados.</p></section>`;
document.getElementById('conteudo').innerHTML=h}
fetch(`./painel_publico.json?v=${Date.now()}`,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}).then(render).catch(err=>document.getElementById('conteudo').innerHTML=`<section class="erro-carregamento"><h2>Não foi possível carregar o painel.</h2><p>${esc(err.message)}</p></section>`);
</script>
<div id="modal" class="modal-fundo" onclick="if(event.target===this)fecharDetalhe()"><div class="modal-caixa"><div class="modal-topo"><h2 id="modal-titulo">Detalhamento</h2><button class="modal-fechar" onclick="fecharDetalhe()">Fechar</button></div><div class="modal-corpo"><div class="modal-acoes"><button onclick="imprimirPDF()">Gerar PDF / Imprimir</button><button onclick="baixarExcel()">Exportar Excel</button></div><div id="modal-conteudo"></div></div></div></div>
</body></html>

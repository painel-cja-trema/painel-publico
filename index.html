<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Pública · Comissão de Juízes Auxiliares – 2º Grau</title>
<style>
:root{
  --azul:#0c4f88;--azul-escuro:#08345d;--verde:#087e5b;--amarelo:#d59a00;
  --roxo:#7048a8;--ciano:#167a91;--texto:#16324a;--muted:#647789;
  --fundo:#eef4f7;--branco:#fff;--borda:#d8e3eb;--sombra:0 10px 30px rgba(17,52,80,.08)
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--fundo);color:var(--texto);font-family:Inter,Segoe UI,Arial,sans-serif}
a{color:inherit;text-decoration:none}.header{background:linear-gradient(135deg,#083f72,#0a5b93);color:#fff;box-shadow:0 4px 18px rgba(0,0,0,.16)}
.header-inner{max-width:1480px;margin:auto;padding:20px 24px 0}.brand-row{display:grid;grid-template-columns:auto 1fr auto;gap:28px;align-items:center}
.logo-card{display:flex;align-items:center;gap:12px}.logo-copy .small{font-size:.78rem;opacity:.9}.logo-copy .big{font-size:1.3rem;font-weight:900}.logo-copy .big span{display:block;font-size:.85rem;letter-spacing:.16em}
.title .eyebrow,.rotulo{font-size:.75rem;font-weight:900;letter-spacing:.13em;text-transform:uppercase}.title h1{margin:5px 0;font-size:clamp(1.45rem,2.5vw,2.25rem)}.title h1 span{font-weight:500}.title p{margin:0;opacity:.9}
.election-card{padding:14px 18px;border:1px solid rgba(255,255,255,.28);border-radius:14px;text-align:center;background:rgba(255,255,255,.09)}.election-word{font-weight:900;letter-spacing:.06em}.year{font-size:1.6rem;font-weight:900}.motto{font-size:.72rem}.voto{color:#ffe26a}
.navline{margin-top:18px;border-top:1px solid rgba(255,255,255,.18)}.nav{display:flex;gap:8px;flex-wrap:wrap;padding:11px 0}.nav a{padding:8px 11px;border-radius:8px;font-size:.9rem}.nav a:hover{background:rgba(255,255,255,.12)}
main{max-width:1480px;margin:auto;padding:24px}.visao-geral,.painel,.cards article,.public-footer-note{background:#fff;border:1px solid var(--borda);border-radius:16px;box-shadow:var(--sombra)}
.visao-geral{padding:22px 24px;display:flex;justify-content:space-between;gap:20px;align-items:center}.visao-geral h2{margin:5px 0}.visao-geral p{margin:0;color:var(--muted)}.fonte{display:flex;gap:10px;align-items:center}.fonte i{width:11px;height:11px;border-radius:50%;background:#0d9b6c;box-shadow:0 0 0 6px #dff6ed}.fonte span,.fonte strong{display:block}.fonte span{font-size:.78rem;color:var(--muted)}
.cards{display:grid;grid-template-columns:repeat(4,minmax(220px,1fr));gap:14px;margin:16px 0}.cards article{padding:19px;display:flex;gap:14px;align-items:center}.card .ico{width:45px;height:45px;border-radius:12px;display:grid;place-items:center;color:#fff;font-size:1.35rem}.card span,.card em{display:block}.card span{font-size:.84rem;color:var(--muted)}.card b{font-size:1.8rem}.card em{font-style:normal;font-size:.76rem;color:var(--muted)}.azul .ico{background:var(--azul)}.verde .ico{background:var(--verde)}.amarelo .ico{background:var(--amarelo)}.ciano .ico{background:var(--ciano)}
.painel{padding:22px;margin:16px 0}.cabecalho-painel,.tarefas-criticas-cabecalho,.todas-tarefas-cabecalho{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.painel h2{margin:5px 0 7px}.painel p{color:var(--muted)}.pill{padding:8px 12px;border-radius:999px;background:#e8f2f8;color:#0b5589;font-weight:800;font-size:.8rem}
.entrada-comissao-card{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:18px}.entrada-comissao-icone{width:58px;height:58px;border-radius:16px;display:grid;place-items:center;background:#eaf3fb;font-size:1.7rem}.entrada-comissao-numero{min-width:110px;text-align:center;padding:12px 18px;border-radius:14px;background:#0b568c;color:#fff}.entrada-comissao-numero small,.entrada-comissao-numero strong{display:block}.entrada-comissao-numero strong{font-size:2rem}.entrada-comissao-acoes,.todas-gab-relatorios,.acoes-painel{display:flex;gap:8px;flex-wrap:wrap}
.btn-relatorio{border:0;border-radius:9px;padding:10px 13px;background:#0b568c;color:#fff;font-weight:800;cursor:pointer}.btn-relatorio.secundario{background:#eef5fa;color:#0b568c;border:1px solid #cfe0ec}
.tarefas-gabinetes-grid,.todas-tarefas-gabinetes-grid,.comparativo{display:grid;grid-template-columns:repeat(3,minmax(260px,1fr));gap:14px;margin-top:16px}.tarefa-gab-card,.todas-gab-card,.gab{border:1px solid var(--borda);border-radius:15px;overflow:hidden;background:#fff}.tarefa-gab-topo,.todas-gab-topo,.gab-topo{padding:15px;background:#f3f8fb;display:flex;justify-content:space-between;gap:12px}.tarefa-gab-topo h3,.todas-gab-topo h3{margin:0}.tarefa-gab-topo p,.todas-gab-topo p{margin:3px 0 0;font-size:.82rem}.tarefa-acervo,.todas-gab-acervo{background:#0b568c;color:#fff;border-radius:11px;padding:8px 12px;text-align:center}.tarefa-acervo small,.tarefa-acervo strong,.todas-gab-acervo small,.todas-gab-acervo strong{display:block}.tarefa-acervo strong,.todas-gab-acervo strong{font-size:1.45rem}
.tarefas-metricas{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}.crit-task{border:1px solid var(--borda);border-radius:11px;padding:11px;background:#fff}.crit-task span,.crit-task em{display:block}.crit-task span{font-size:.77rem;font-weight:800}.crit-task strong{font-size:1.55rem}.crit-task em{font-size:.7rem;color:var(--muted);font-style:normal}.crit-task.zero{opacity:.52}
.tarefas-total-comissao{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.tarefas-total-comissao>div,.tarefas-total-comissao>a{padding:11px 14px;border-radius:11px;background:#eef5f9}.tarefas-total-comissao small,.tarefas-total-comissao strong{display:block}.tarefas-total-comissao strong{font-size:1.35rem}
.todas-tarefas-resumo{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0}.todas-tarefas-resumo>div{background:#eef5f9;border-radius:11px;padding:12px}.todas-tarefas-resumo small,.todas-tarefas-resumo strong{display:block}.todas-tarefas-resumo strong{font-size:1.3rem}.relatorios-acervo-geral{display:flex;justify-content:space-between;gap:18px;align-items:center;border:1px dashed #b9cedc;border-radius:13px;padding:15px;margin-bottom:14px}
.todas-gab-relatorios{padding:12px 12px 0}.todas-gab-lista{padding:12px}.todas-task-row{display:flex;justify-content:space-between;gap:14px;padding:9px 3px;border-bottom:1px solid #edf1f4}.todas-task-row:last-child{border-bottom:0}.todas-task-row span{font-size:.85rem}.todas-task-row strong{color:#0b568c}
.gab-topo{background:#0b568c;color:#fff;display:block}.gab-topo strong,.gab-topo span{display:block}.gab-corpo{padding:15px}.responsaveis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.responsaveis>div,.metricas span{background:#f2f7fa;border-radius:10px;padding:10px}.responsaveis small,.responsaveis b,.metricas span,.metricas b{display:block}.responsaveis small,.metricas span{font-size:.75rem}.estoque-linha{display:flex;justify-content:space-between;align-items:center;padding:14px 0}.estoque-linha strong{font-size:1.5rem}.metricas{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.metricas b{font-size:1.2rem;margin-top:3px}
.grid-dupla,.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px 9px;border-bottom:1px solid #e7edf1;text-align:left;font-size:.84rem}th{color:#4f6576;background:#f6f9fb}.chip,.badge-dias{display:inline-block;padding:5px 8px;border-radius:999px;background:#e8f2f8;color:#0b568c;font-weight:800;font-size:.74rem}
.status{padding:12px;border-radius:10px}.status.pronto{background:#e7f6ef;color:#08724f}.status.vazio{background:#f2f5f7}.muted{color:var(--muted)}.public-footer-note{padding:16px 20px;margin:16px 0}.loading,.erro{padding:22px;background:#fff;border:1px solid var(--borda);border-radius:14px}.erro{color:#9b251d}
@media(max-width:1050px){.brand-row{grid-template-columns:1fr}.election-card{display:none}.cards{grid-template-columns:repeat(2,1fr)}.tarefas-gabinetes-grid,.todas-tarefas-gabinetes-grid,.comparativo{grid-template-columns:1fr}.entrada-comissao-card{grid-template-columns:auto 1fr}.entrada-comissao-numero,.entrada-comissao-acoes{grid-column:2}.todas-tarefas-resumo{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){main{padding:14px}.header-inner{padding:15px 14px 0}.cards,.grid-dupla,.grid,.responsaveis{grid-template-columns:1fr}.visao-geral,.cabecalho-painel,.tarefas-criticas-cabecalho,.relatorios-acervo-geral{display:block}.fonte{margin-top:16px}.entrada-comissao-card{display:block}.entrada-comissao-numero{display:inline-block;margin:12px 0}.todas-tarefas-resumo{grid-template-columns:1fr}.tarefas-metricas{grid-template-columns:1fr}}
@media print{.header,.navline,.btn-relatorio{display:none!important}body{background:#fff}main{max-width:none;padding:0}.painel,.visao-geral,.cards article{box-shadow:none;break-inside:avoid}}
</style>
</head>
<body>
<header class="header">
 <div class="header-inner">
  <div class="brand-row">
   <div class="logo-card">
    <div aria-label="Justiça Eleitoral">
      <svg width="70" height="70" viewBox="0 0 120 120"><rect x="50" y="22" width="49" height="75" fill="#f3c51c"/><path d="M40 98 L100 98 L100 60 Z" fill="#205e44"/><path d="M39 98 L100 59" stroke="#fff" stroke-width="4"/><circle cx="52" cy="49" r="38" fill="#2d5eb8" stroke="#fff" stroke-width="4"/></svg>
    </div>
    <div class="logo-copy"><div class="small">Tribunal Regional Eleitoral</div><div class="big">TRE <span>MARANHÃO</span></div></div>
   </div>
   <div class="title"><div class="eyebrow">Consulta Pública</div><h1>Comissão de Juízes Auxiliares <span>– 2º Grau</span></h1><p>Estoque, julgamentos e distribuição de minuta</p></div>
   <div class="election-card"><div class="election-word">ELEIÇÕES</div><span class="year">2026</span><div class="motto"><span class="voto">#VOTO</span> NA DEMOCRACIA</div></div>
  </div>
  <div class="navline"><nav class="nav"><a href="#comparativo">Comparativo</a><a href="#entrada-comissao">Entrada</a><a href="#tarefas-criticas">Tarefas críticas</a><a href="#todas-tarefas">Todas as tarefas</a><a href="#julgados">Julgados</a><a href="#minuta">Minutas</a></nav></div>
 </div>
</header>
<main id="app"><div class="loading">Carregando painel público...</div></main>
<script>
const APP=document.getElementById('app');
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const arr=v=>Array.isArray(v)?v:[];
const n=v=>Number(v||0);
const juiz=g=>g==='Gab. JA 1'?'Dr. Nilo Ribeiro':g==='Gab. JA 2'?'Dra. Manuella Ribeiro':'Dr. Rubem Filho';

function baixarCSV(nome, linhas){
  const csv=linhas.map(l=>l.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(';')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nome;a.click();URL.revokeObjectURL(a.href);
}
function relatorioGeral(d){
  const linhas=[['Gabinete','Tarefa','Quantidade']];
  arr(d.todas_tarefas?.linhas).forEach(l=>arr(d.todas_tarefas?.colunas).forEach(c=>{const q=n(l.contagens?.[c.nome]);if(q)linhas.push([c.gabinete,l.tarefa,q])}));
  baixarCSV('relatorio_publico_geral.csv',linhas);
}
function relatorioGabinete(d,nome,gabinete){
  const linhas=[['Gabinete','Tarefa','Quantidade']];
  arr(d.todas_tarefas?.linhas).forEach(l=>{const q=Number(l.contagens?.[nome]||0);if(q)linhas.push([gabinete,l.tarefa,q])});
  baixarCSV('relatorio_'+gabinete.replace(/\W+/g,'_')+'.csv',linhas);
}
function card(cls,ico,titulo,valor,sub){return `<article class="card ${cls}"><div class="ico">${ico}</div><div><span>${titulo}</span><b>${valor}</b><em>${sub}</em></div></article>`}
function render(d){
  const tc=d.tarefas_criticas||{}, tt=d.todas_tarefas||{};
  APP.innerHTML=`
  <section class="visao-geral"><div><span class="rotulo">CONSULTA PÚBLICA</span><h2>Acompanhamento da Comissão</h2><p>Dados restritos a processos sem segredo de justiça.</p></div><div class="fonte"><i></i><div><span>Última publicação</span><strong>${esc(d.publicado_em||'Não informada')}</strong></div></div></section>
  <section class="cards">
   ${card('azul','▤','Estoque atual',n(d.total),'processos públicos nos três gabinetes')}
   ${card('verde','✓','Processos julgados',n(d.julgados_total),'coluna “julgamento” preenchida')}
   ${card('amarelo','▣','Arquivados identificados',n(d.arquivados_total),'tarefa ou último movimento')}
   ${card('ciano','▧','Comissão · Minutar ato',arr(d.minutar_processos).length,'fila pública pronta para distribuição')}
  </section>
  ${d.entrada_comissao?`<section id="entrada-comissao" class="painel"><div class="entrada-comissao-card"><div class="entrada-comissao-icone">⚖</div><div><span class="rotulo">PORTA DE ENTRADA DA COMISSÃO</span><h2>Processos com liminar aguardando certificação</h2><p>${esc(d.entrada_comissao.descricao||'')}</p></div><div class="entrada-comissao-numero"><small>Total público</small><strong>${n(d.entrada_comissao.total)}</strong></div><div class="entrada-comissao-acoes"><button class="btn-relatorio secundario" onclick="window.print()">PDF</button></div></div></section>`:''}
  ${tc.linhas?`<section id="tarefas-criticas" class="painel"><div class="tarefas-criticas-cabecalho"><div><span class="rotulo">CONTROLE OPERACIONAL</span><h2>Tarefas críticas por gabinete</h2><p>Acompanhamento público das filas críticas, sem processos em segredo de justiça.</p></div></div><div class="tarefas-gabinetes-grid">
  ${arr(tc.linhas).map((l,i)=>`<article class="tarefa-gab-card"><div class="tarefa-gab-topo"><div><h3>${esc(l.gabinete)}</h3><p>${juiz(l.gabinete)}</p></div><div class="tarefa-acervo"><small>Acervo</small><strong>${n(l.total_acervo)}</strong></div></div><div class="tarefas-metricas">${arr(tc.colunas).map(c=>`<div class="crit-task ${n(l.contagens?.[c.codigo])===0?'zero':''}"><span>${esc(c.rotulo)}</span><strong>${n(l.contagens?.[c.codigo])}</strong><em>${esc(c.descricao||'')}</em></div>`).join('')}</div></article>`).join('')}</div><div class="tarefas-total-comissao"><div class="total-principal"><small>Total público da Comissão</small><strong>${n(tc.total_acervo)}</strong></div>${arr(tc.colunas).map(c=>`<div><small>${esc(c.curto)}</small><strong>${n(tc.totais?.[c.codigo])}</strong></div>`).join('')}</div></section>`:''}
  ${tt.linhas?`<section id="todas-tarefas" class="painel"><div class="cabecalho-painel"><div><span class="rotulo">ESTOQUE OPERACIONAL</span><h2>Todas as tarefas do acervo público da Comissão</h2><p>Visão principal organizada por gabinete.</p></div><span class="pill">${arr(tt.linhas).length} tarefa(s)</span></div><div class="todas-tarefas-resumo"><div><small>Acervo total</small><strong>${n(tt.total_acervo)}</strong></div><div><small>Tarefas distintas</small><strong>${arr(tt.linhas).length}</strong></div><div><small>Gabinetes</small><strong>3</strong></div><div><small>Gabinetes</small><strong>JA 1 · JA 2 · JA 3</strong></div></div><div class="relatorios-acervo-geral"><div><span class="rotulo">RELATÓRIO GERAL</span><h3>Processos públicos de todos os gabinetes</h3><p>Exporta a distribuição de tarefas exibida no painel.</p></div><div class="acoes-painel"><button class="btn-relatorio secundario" onclick="window.print()">PDF público geral</button><button class="btn-relatorio" id="csv-geral">Excel/CSV geral</button></div></div><div class="todas-tarefas-gabinetes-grid">${arr(tt.colunas).map((c,i)=>{let total=0;arr(tt.linhas).forEach(l=>total+=n(l.contagens?.[c.nome]));return `<article class="todas-gab-card"><div class="todas-gab-topo"><div><h3>${esc(c.gabinete)}</h3><p>${juiz(c.gabinete)}</p></div><div class="todas-gab-acervo"><small>Acervo</small><strong>${total}</strong></div></div><div class="todas-gab-relatorios"><button class="btn-relatorio secundario" onclick="window.print()">PDF do gabinete</button><button class="btn-relatorio gab-csv" data-nome="${esc(c.nome)}" data-gab="${esc(c.gabinete)}">Excel/CSV do gabinete</button></div><div class="todas-gab-lista">${arr(tt.linhas).map(l=>{const q=n(l.contagens?.[c.nome]);return q?`<div class="todas-task-row"><span>${esc(l.tarefa)}</span><strong>${q}</strong></div>`:''}).join('')}</div></article>`}).join('')}</div></section>`:''}
  <section id="comparativo" class="painel"><div class="cabecalho-painel"><div><span class="rotulo">ANÁLISE COMPARATIVA</span><h2>Comparativo entre gabinetes</h2><p>Estoque público, tempo de tramitação, julgados e fila de minuta por gabinete.</p></div><span class="pill">Gab. JA 1 · Gab. JA 2 · Gab. JA 3</span></div><div class="comparativo">${arr(d.comparativo).map(x=>`<article class="gab"><div class="gab-topo"><strong>${esc(x.gabinete)}</strong><span>${esc(x.nome)}</span></div><div class="gab-corpo"><div class="responsaveis"><div><small>Juiz auxiliar</small><b>${esc(x.juiz)}</b></div><div><small>Responsável pela distribuição</small><b>${esc(x.distribuidor)}</b></div></div><div class="estoque-linha"><span>Estoque atual</span><strong>${n(x.quantidade)} <small>processos</small></strong></div><div class="metricas"><span>Média de dias<b>${n(x.media_dias)}</b></span><span>Maior tempo<b>${n(x.maior_tempo)} dias</b></span><span>Urgentes<b>${n(x.urgentes)}</b></span><span>Minutar ato<b>${n(x.minutar)}</b></span><span>Julgados<b>${n(x.julgados)}</b></span><span>% julgados<b>${n(x.percentual_julgados)}%</b></span></div></div></article>`).join('')}</div></section>
  <section id="julgados" class="painel"><div class="cabecalho-painel"><div><span class="rotulo">RESULTADO JURISDICIONAL</span><h2>Controle de julgados</h2><p>Processos com a coluna julgamento preenchida.</p></div><span class="pill">Julgamentos</span></div>${arr(d.julgados_recentes).length?`<div class="grid-dupla"><div><h3>Julgados recentes</h3><div class="wrap"><table><thead><tr><th>Processo</th><th>Gabinete</th><th>Data</th><th>Teor</th><th>Dias</th></tr></thead><tbody>${arr(d.julgados_recentes).map(x=>`<tr><td>${esc(x.processo)}</td><td><span class="chip">${esc(x.gabinete)}</span></td><td>${esc(x.data_julgamento||'Não identificada')}</td><td>${esc(x.teor)}</td><td>${n(x.dias_tramitando)}</td></tr>`).join('')}</tbody></table></div></div><div><h3>Teores mais frequentes</h3><table><thead><tr><th>Teor</th><th>Qtd.</th></tr></thead><tbody>${arr(d.teores).map(x=>`<tr><td>${esc(x.teor)}</td><td>${n(x.quantidade)}</td></tr>`).join('')}</tbody></table></div></div>`:'<p class="muted">Não há processos públicos julgados no recorte atual.</p>'}</section>
  <section class="grid"><section class="painel"><span class="rotulo">TEMPO DE TRAMITAÇÃO</span><h2>Faixas do estoque</h2><table><thead><tr><th>Faixa</th><th>Quantidade</th></tr></thead><tbody>${arr(d.por_faixa).map(x=>`<tr><td>${esc(x.faixa)}</td><td>${n(x.quantidade)}</td></tr>`).join('')}</tbody></table></section><section id="minuta" class="painel"><span class="rotulo">OPERAÇÃO</span><h2>Distribuição de minuta · Comissão</h2><p class="status ${arr(d.minutar_processos).length?'pronto':'vazio'}">${arr(d.minutar_processos).length?'✓ Há '+arr(d.minutar_processos).length+' processo(s) público(s) pronto(s) para distribuição.':'Não há processos públicos em “Minutar ato”.'}</p></section></section>
  <section class="painel"><span class="rotulo">ESTOQUE OPERACIONAL</span><h2>Tarefas atuais por gabinete</h2><div class="wrap"><table><thead><tr><th>Gabinete</th><th>Tarefa</th><th>Quantidade</th></tr></thead><tbody>${arr(d.por_tarefa).map(x=>`<tr><td><span class="chip">${esc(x.gabinete)}</span></td><td>${esc(x.tarefa_atual)}</td><td>${n(x.quantidade)}</td></tr>`).join('')}</tbody></table></div></section>
  <section class="painel"><span class="rotulo">ATENÇÃO PRIORITÁRIA</span><h2>Processos com maior tempo de tramitação</h2><div class="wrap"><table><thead><tr><th>Processo</th><th>Gabinete</th><th>Classe</th><th>Tarefa</th><th>Dias</th></tr></thead><tbody>${arr(d.mais_antigos).map(x=>`<tr><td>${esc(x.processo)}</td><td><span class="chip">${esc(x.gabinete)}</span></td><td>${esc(x.classe)}</td><td>${esc(x.tarefa_atual)}</td><td><span class="badge-dias">${n(x.dias_tramitando)}</span></td></tr>`).join('')}</tbody></table></div></section>
  <section class="public-footer-note"><span class="rotulo">ORIGEM</span><p>Indicadores gerados a partir da base mais recente publicada pelo sistema interno, com exclusão de processos em segredo de justiça. Arquivo de origem: <b>${esc(d.arquivo_origem||'não informado')}</b>.</p></section>`;
  document.getElementById('csv-geral')?.addEventListener('click',()=>relatorioGeral(d));
  document.querySelectorAll('.gab-csv').forEach(b=>b.addEventListener('click',()=>relatorioGabinete(d,b.dataset.nome,b.dataset.gab)));
}
async function carregarPainelPublico(){
  const agora=Date.now();
  const caminhos=[
    new URL('painel_publico.json?ts='+agora, window.location.href).href,
    'https://painel-cja-trema.github.io/painel-publico/painel_publico.json?ts='+agora,
    'https://raw.githubusercontent.com/painel-cja-trema/painel-publico/main/painel_publico.json?ts='+agora
  ];
  let ultimoErro=null;
  for(const url of [...new Set(caminhos)]){
    try{
      const resposta=await fetch(url,{cache:'no-store'});
      if(!resposta.ok) throw new Error(`HTTP ${resposta.status} em ${url}`);
      const texto=await resposta.text();
      const dados=JSON.parse(texto.replace(/^\uFEFF/,''));
      render(dados);
      return;
    }catch(erro){
      ultimoErro=erro;
    }
  }
  APP.innerHTML=`<div class="erro"><strong>Não foi possível carregar o painel público.</strong><br>${esc(ultimoErro?.message||'Arquivo painel_publico.json indisponível.')}</div>`;
}
carregarPainelPublico();
</script>
